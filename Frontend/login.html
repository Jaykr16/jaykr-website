<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#eee;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:250px;
}

button{
padding:10px;
width:100%;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

if(user==="admin" && pass==="1234"){

window.location="admin.html"

}

else{

alert("Wrong login")

}

}

</script>

</body>

</html>
